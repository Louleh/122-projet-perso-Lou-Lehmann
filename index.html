<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon projet 122</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <header>
    <h1>Liste des golfs</h1>
  </header>

  <main>
    <div class="controls">
      <input type="text" id="search" placeholder="Rechercher un parcours...">
      <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
        <select id="filter-type" class="filter-select">
          <option value="">Tous les types</option>
          <option value="Parcours">Parcours</option>
          <option value="Practice">Practice</option>
        </select>
        <select id="filter-region" class="filter-select">
          <option value="">Toutes les régions</option>
          <option value="Jura">Jura</option>
          <option value="Valais">Valais</option>
          <option value="Vaud">Vaud</option>
          <option value="Genève">Genève</option>
          <option value="Grisons">Grisons</option>
          <option value="Tessin">Tessin</option>
          <option value="Berne">Berne</option>
          <option value="Zurich">Zurich</option>
          <option value="Autre">Autre</option>
        </select>
        <button id="btn-sort">Trier par note ↓</button>
        <button id="btn-show-add-modal">Ajouter un parcours</button>
      </div>
    </div>

    <ul id="list"></ul>
  </main>

  <div id="add-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-add-modal" class="close-btn">&times;</span>
      <form id="form-add-course">
        <h2>Ajouter un parcours</h2>

        <div class="form-group">
          <label for="input-course-type">Type</label>
          <select id="input-course-type">
            <option value="Parcours">Parcours</option>
            <option value="Practice">Practice</option>
          </select>
        </div>

        <div class="form-group">
          <label for="input-course-name">Nom du golf</label>
          <input type="text" id="input-course-name" placeholder="Ex : Golf Club Delémont">
          <span class="error-msg" id="error-input-name"></span>
        </div>

        <div class="form-group">
          <label for="input-course-location">Lieu</label>
          <input type="text" id="input-course-location" placeholder="Ex : Delémont">
          <span class="error-msg" id="error-input-location"></span>
        </div>

        <div class="form-group">
          <label for="input-course-region">Région</label>
          <select id="input-course-region">
            <option value="Jura">Jura</option>
            <option value="Valais">Valais</option>
            <option value="Vaud">Vaud</option>
            <option value="Genève">Genève</option>
            <option value="Grisons">Grisons</option>
            <option value="Tessin">Tessin</option>
            <option value="Berne">Berne</option>
            <option value="Zurich">Zurich</option>
            <option value="Autre">Autre</option>
          </select>
        </div>

        <div class="form-group" id="input-group-holes">
          <label for="input-course-holes">Trous</label>
          <select id="input-course-holes">
            <option value="18">18 trous</option>
            <option value="9">9 trous</option>
          </select>
          <span class="error-msg" id="error-input-holes"></span>
        </div>

        <div class="form-group" id="input-group-par">
          <label for="input-course-par">Par</label>
          <input type="number" id="input-course-par" placeholder="Ex: 72">
          <span class="error-msg" id="error-input-par"></span>
        </div>

        <div class="form-group">
          <label for="input-course-year">Année de fondation</label>
          <input type="number" id="input-course-year" placeholder="Ex: 1995" step="1">
          <span class="error-msg" id="error-input-year"></span>
        </div>

        <div class="form-group">
          <label for="input-course-rating">Note (1–5)</label>
          <input type="number" id="input-course-rating" placeholder="5">
          <span class="error-msg" id="error-input-rating"></span>
        </div>

        <button type="submit" id="btn-submit-course">Ajouter au catalogue</button>
      </form>
    </div>
  </div>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <span id="close-modal" class="close-btn">&times;</span>
      <h2>Modifier le parcours</h2>
      <form id="form-edit-course">
        <input type="hidden" id="edit-course-id">

        <div class="form-group">
          <label for="edit-course-type">Type</label>
          <select id="edit-course-type">
            <option value="Parcours">Parcours</option>
            <option value="Practice">Practice</option>
          </select>
        </div>

        <div class="form-group">
          <label for="edit-course-name">Nom du golf</label>
          <input type="text" id="edit-course-name">
          <span class="error-msg" id="error-edit-name"></span>
        </div>

        <div class="form-group">
          <label for="edit-course-location">Lieu</label>
          <input type="text" id="edit-course-location">
          <span class="error-msg" id="error-edit-location"></span>
        </div>

        <div class="form-group">
          <label for="edit-course-region">Région</label>
          <select id="edit-course-region">
            <option value="Jura">Jura</option>
            <option value="Valais">Valais</option>
            <option value="Vaud">Vaud</option>
            <option value="Genève">Genève</option>
            <option value="Grisons">Grisons</option>
            <option value="Tessin">Tessin</option>
            <option value="Berne">Berne</option>
            <option value="Zurich">Zurich</option>
            <option value="Autre">Autre</option>
          </select>
        </div>

        <div class="form-group" id="edit-group-holes">
          <label for="edit-course-holes">Trous</label>
          <select id="edit-course-holes">
            <option value="18">18 trous</option>
            <option value="9">9 trous</option>
          </select>
          <span class="error-msg" id="error-edit-holes"></span>
        </div>

        <div class="form-group" id="edit-group-par">
          <label for="edit-course-par">Par</label>
          <input type="number" id="edit-course-par">
          <span class="error-msg" id="error-edit-par"></span>
        </div>

        <div class="form-group">
          <label for="edit-course-year">Année de fondation</label>
          <input type="number" id="edit-course-year" step="1">
          <span class="error-msg" id="error-edit-year"></span>
        </div>

        <div class="form-group">
          <label for="edit-course-rating">Note (1–5)</label>
          <input type="number" id="edit-course-rating">
          <span class="error-msg" id="error-edit-rating"></span>
        </div>

        <button type="submit" id="btn-submit-edit">Enregistrer</button>
      </form>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
